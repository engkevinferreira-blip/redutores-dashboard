<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:24px;color:#fff;
  background:linear-gradient(135deg,#A63839 0%,#8F2F30 45%,#111827 100%)}
.card{width:100%;max-width:380px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:30px 26px 26px;
  backdrop-filter:blur(6px);box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
.logos{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.logos span{background:#fff;border-radius:10px;padding:8px 10px;display:flex;align-items:center}
.logos img{height:34px;width:auto;display:block}
h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:20px;margin:0 0 4px;line-height:1.2}
.sub{font-size:12.5px;color:rgba(255,255,255,.75);margin-bottom:22px;letter-spacing:.02em}
form{display:flex;flex-direction:column;gap:12px}
input[type=password]{font-size:16px;padding:13px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.95);color:#111827;outline:none}
input[type=password]:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.rem{display:flex;align-items:center;gap:8px;font-size:12.5px;color:rgba(255,255,255,.8);justify-content:center}
.rem input{width:16px;height:16px}
button{font-size:15px;font-weight:600;padding:13px;border:none;border-radius:10px;cursor:pointer;
  background:#fff;color:#8F2F30;transition:transform .1s}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(0)}
#err{min-height:16px;font-size:12.5px;color:#ffd7d7;font-weight:600}
.foot{margin-top:16px;font-size:11px;color:rgba(255,255,255,.55)}
.spin{display:none;font-size:12.5px;color:rgba(255,255,255,.8)}
</style>

function b64u(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function derive(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function openWith(pw){
  const key=await derive(pw);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:IV},key,CT);
  return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
const f=document.getElementById('f'),err=document.getElementById('err'),spin=document.getElementById('spin');
f.addEventListener('submit',async e=>{
  e.preventDefault();err.textContent='';spin.style.display='block';
  const pw=document.getElementById('pw').value;
  try{const html=await openWith(pw);
    if(document.getElementById('rem').checked) localStorage.setItem('dashpw',pw);
    render(html);
  }catch(_){spin.style.display='none';err.textContent='Senha incorreta.';}
});
(async()=>{const s=localStorage.getItem('dashpw');
  if(s){try{render(await openWith(s));}catch(_){localStorage.removeItem('dashpw');}}})();
</script>
